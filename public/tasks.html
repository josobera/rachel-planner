<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F5F2EA">
<title>Tasks · My Day</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400;1,500&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Mulish',-apple-system,'Segoe UI',sans-serif;background:#F5F2EA;color:#2C3E45;-webkit-font-smoothing:antialiased}
  .app{max-width:440px;margin:0 auto;min-height:100vh;background:#F5F2EA;overflow-x:hidden;padding-bottom:90px}
  .serif{font-family:'Lora',serif}
  .top{position:sticky;top:0;z-index:10;background:rgba(245,242,234,.92);backdrop-filter:blur(8px);display:flex;align-items:center;gap:12px;padding:calc(20px + env(safe-area-inset-top,0)) 18px 13px;border-bottom:1px solid #E6E2D6}
  .back{width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #E6E2D6;display:flex;align-items:center;justify-content:center;color:#3F7E99;text-decoration:none;font-size:22px;line-height:1;padding-bottom:3px}
  .filters{display:flex;gap:8px;overflow-x:auto;padding:14px 18px 4px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex:none;font-weight:600;font-size:12px;color:#5A7681;background:#fff;border:1px solid #E6E2D6;border-radius:999px;padding:7px 14px;cursor:pointer;font-family:inherit}
  .chip.on{background:#3F7E99;border-color:#3F7E99;color:#fff}
  .body{padding:8px 18px 20px;display:flex;flex-direction:column;gap:18px}
  .group-h{font-weight:700;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8AA0A3;margin:6px 2px 0}
  .task{background:#fff;border:1px solid #E6E2D6;border-radius:15px;padding:13px 14px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 1px 5px rgba(44,62,69,.05);margin-top:9px}
  .ck{width:21px;height:21px;border-radius:50%;border:1.7px solid #CBD9D3;flex:none;cursor:pointer;margin-top:1px;position:relative;transition:.15s}
  .ck.done{background:#3F7E99;border-color:#3F7E99}
  .ck.done::after{content:"";position:absolute;left:6.5px;top:3px;width:4px;height:8.5px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .ttl{font-weight:500;font-size:15px;line-height:1.3}
  .task.done .ttl{text-decoration:line-through;color:#A9B7B8}
  .pill{font-weight:700;font-size:9px;letter-spacing:.07em;text-transform:uppercase;border-radius:6px;padding:3px 8px}
  .meta{font-weight:500;font-size:12px;color:#8AA0A3}
  .laura{display:inline-flex;align-items:center;gap:5px;font-weight:600;font-size:12px;color:#2F6E63;background:#E1EFEC;border:none;border-radius:9px;padding:6px 11px;margin-top:9px;cursor:pointer;font-family:inherit}
  .add{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);display:flex;align-items:center;gap:7px;background:#3F7E99;color:#fff;border:none;border-radius:999px;padding:13px 22px;font-weight:600;font-size:14px;cursor:pointer;box-shadow:0 8px 24px rgba(44,62,69,.22);font-family:inherit;z-index:20}
  .toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(16px);background:#2C3E45;color:#F5F2EA;font-size:13px;font-weight:600;padding:11px 18px;border-radius:14px;opacity:0;transition:.25s;pointer-events:none;z-index:99;box-shadow:0 8px 24px rgba(44,62,69,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{text-align:center;color:#A9B7B8;font-style:italic;font-family:'Lora',serif;padding:24px 0}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="index.html" aria-label="Back to home">&lsaquo;</a>
    <span class="serif" style="font-weight:600;font-size:22px">Tasks</span>
    <span style="margin-left:auto;font-weight:600;font-size:13px;color:#8AA0A3" id="left"></span>
  </div>
  <div class="filters" id="filters"></div>
  <div class="body" id="body"></div>
</div>
<button class="add" onclick="toast('Adding tasks comes with your live data')"><span style="font-size:17px;line-height:1">+</span> Add task</button>
<div class="toast" id="toastEl"></div>

<script>
  const CATS = {
    Family:['#9A7B4C','#F0E8D7'], Nanny:['#2F6E63','#E1EFEC'], Kids:['#4E89A6','#E6F0F2'],
    Grocery:['#A86A3F','#F3E6DA'], Personal:['#3F7E99','#E3EFF1']
  };
  let TASKS = [
    {text:'Pick up Jackson from soccer', cat:'Family', when:'today', meta:'4:30 PM', done:false},
    {text:'Send Laura the Thursday plan', cat:'Nanny', when:'today', meta:'', done:false},
    {text:'Grocery for taco night', cat:'Grocery', when:'today', meta:'', done:false},
    {text:'Text Matt about the weekend', cat:'Family', when:'today', meta:'', done:false},
    {text:'Return Amazon package', cat:'Personal', when:'today', meta:'', done:true},
    {text:"Order Pearson's kindergarten supplies", cat:'Kids', when:'week', meta:'Thu', done:false},
    {text:'Schedule Parker’s 3-year checkup', cat:'Kids', when:'week', meta:'', done:false},
    {text:'Laura — pediatrician forms for Pearson', cat:'Nanny', when:'week', meta:'', done:false},
    {text:'Refill Jackson’s inhaler', cat:'Family', when:'week', meta:'', done:false}
  ];
  let filter = 'All';

  function renderFilters(){
    const cats = ['All', ...Object.keys(CATS)];
    document.getElementById('filters').innerHTML = cats.map(c =>
      `<button class="chip ${filter===c?'on':''}" onclick="filter='${c}';render()">${c}</button>`).join('');
  }

  function taskRow(t, i){
    const [pc,pb] = CATS[t.cat] || ['#5A7681','#E8ECEA'];
    return `<div class="task ${t.done?'done':''}">
      <span class="ck ${t.done?'done':''}" role="button" aria-label="Toggle done" onclick="toggle(${i})"></span>
      <div style="flex:1;min-width:0">
        <div class="ttl">${t.text}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap">
          <span class="pill" style="color:${pc};background:${pb}">${t.cat}</span>
          ${t.meta?`<span class="meta">· ${t.meta}</span>`:''}
        </div>
        ${t.cat==='Nanny' && !t.done ? `<button class="laura" onclick="toast('Sent to Laura ✓')">Send to Laura <span style="font-size:13px">&#8599;</span></button>`:''}
      </div>
    </div>`;
  }

  function render(){
    renderFilters();
    const show = TASKS.map((t,i)=>({t,i})).filter(({t})=> filter==='All' || t.cat===filter);
    document.getElementById('left').textContent = TASKS.filter(t=>!t.done).length + ' left';
    const groups = [['today','Today'],['week','This week']];
    let html = '';
    for(const [key,label] of groups){
      const rows = show.filter(({t})=>t.when===key);
      if(!rows.length) continue;
      html += `<div><div class="group-h">${label}</div>${rows.map(({t,i})=>taskRow(t,i)).join('')}</div>`;
    }
    if(!html) html = `<div class="empty">Nothing here — enjoy the quiet.</div>`;
    document.getElementById('body').innerHTML = html;
  }

  function toggle(i){ TASKS[i].done = !TASKS[i].done; render(); }
  let tt;
  function toast(m){ const e=document.getElementById('toastEl'); e.textContent=m; e.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>e.classList.remove('show'),1900); }
  render();
</script>
</body>
</html>
