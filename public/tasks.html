<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F5F2EA">
<title>Tasks · Rachel's Planner</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400;1,500&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Mulish',-apple-system,'Segoe UI',sans-serif;background:#F5F2EA;color:#2C3E45;-webkit-font-smoothing:antialiased}
  .app{max-width:440px;margin:0 auto;min-height:100vh;background:#F5F2EA;overflow-x:hidden;padding-bottom:100px}
  .serif{font-family:'Lora',serif}
  .top{position:sticky;top:0;z-index:10;background:rgba(245,242,234,.92);backdrop-filter:blur(8px);display:flex;align-items:center;gap:12px;padding:calc(20px + env(safe-area-inset-top,0)) 18px 13px;border-bottom:1px solid #E6E2D6}
  .back{width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #E6E2D6;display:flex;align-items:center;justify-content:center;color:#3F7E99;text-decoration:none;font-size:22px;line-height:1;padding-bottom:3px}
  .filters{display:flex;gap:8px;overflow-x:auto;padding:14px 18px 4px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex:none;font-weight:600;font-size:12px;color:#5A7681;background:#fff;border:1px solid #E6E2D6;border-radius:999px;padding:7px 14px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .chip.on{background:#3F7E99;border-color:#3F7E99;color:#fff}
  .body{padding:8px 18px 20px;display:flex;flex-direction:column;gap:4px}
  .group-h{font-weight:700;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8AA0A3;margin:14px 2px 6px}
  .task{background:#fff;border:1px solid #E6E2D6;border-radius:15px;padding:13px 14px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 1px 5px rgba(44,62,69,.05);margin-bottom:8px;cursor:pointer;transition:box-shadow .15s}
  .task:active{box-shadow:0 2px 10px rgba(44,62,69,.12)}
  .ck{width:22px;height:22px;border-radius:50%;border:1.7px solid #CBD9D3;flex:none;cursor:pointer;margin-top:1px;position:relative;transition:.15s}
  .ck.done{background:#3F7E99;border-color:#3F7E99}
  .ck.done::after{content:"";position:absolute;left:6.5px;top:3px;width:4px;height:8.5px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .ttl{font-weight:500;font-size:15px;line-height:1.3}
  .task.done .ttl{text-decoration:line-through;color:#A9B7B8}
  .pill{font-weight:700;font-size:9px;letter-spacing:.07em;text-transform:uppercase;border-radius:6px;padding:3px 8px;flex:none}
  .meta{font-weight:500;font-size:12px;color:#8AA0A3}
  .add{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom,0));transform:translateX(-50%);display:flex;align-items:center;gap:7px;background:#3F7E99;color:#fff;border:none;border-radius:999px;padding:13px 22px;font-weight:600;font-size:14px;cursor:pointer;box-shadow:0 8px 24px rgba(44,62,69,.22);font-family:inherit;z-index:20}
  .empty{text-align:center;color:#A9B7B8;font-style:italic;font-family:'Lora',serif;padding:40px 0 24px}
  /* Sheet */
  .sheet-overlay{position:fixed;inset:0;background:rgba(44,62,69,.35);z-index:50;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
  .sheet-overlay.open{opacity:1;pointer-events:all}
  .sheet{background:#fff;border-radius:22px 22px 0 0;padding:0 20px calc(32px + env(safe-area-inset-bottom,0));width:100%;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1,.23,1)}
  .sheet-overlay.open .sheet{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:#E6E2D6;border-radius:2px;margin:12px auto 16px}
  .sheet-title{font-family:'Lora',serif;font-weight:600;font-size:20px;margin-bottom:18px}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .field-label{font-weight:700;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#3F7E99}
  .field input,.field textarea,.field select{border:1.5px solid #E6E2D6;border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;color:#2C3E45;background:#fff;outline:none;width:100%}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:#3F7E99}
  .field textarea{resize:none;height:72px}
  .field-row{display:flex;gap:10px;margin-bottom:14px}
  .field-row .field{flex:1;margin-bottom:0}
  .sheet-actions{display:flex;gap:10px;margin-top:6px}
  .btn{flex:1;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.15s}
  .btn-ghost{background:#F0EDE5;color:#2C3E45}
  .btn-primary{background:#3F7E99;color:#fff}
  .btn-danger{background:#E8B4B4;color:#8B2020}
  .when-row{display:flex;gap:8px;margin-bottom:14px}
  .when-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid #E6E2D6;background:#fff;font-family:inherit;font-size:13px;font-weight:600;color:#5A7681;cursor:pointer;transition:.15s}
  .when-btn.active{background:#3F7E99;border-color:#3F7E99;color:#fff}
  .cat-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .cat-btn{padding:7px 12px;border-radius:8px;border:1.5px solid #E6E2D6;background:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
  .toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(16px);background:#2C3E45;color:#F5F2EA;font-size:13px;font-weight:600;padding:11px 18px;border-radius:14px;opacity:0;transition:.25s;pointer-events:none;z-index:99;box-shadow:0 8px 24px rgba(44,62,69,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="/" aria-label="Back to home">&lsaquo;</a>
    <span class="serif" style="font-weight:600;font-size:22px">Tasks</span>
    <span style="margin-left:auto;font-weight:600;font-size:13px;color:#8AA0A3" id="left"></span>
  </div>
  <div class="filters" id="filters"></div>
  <div class="body" id="body"></div>
</div>

<button class="add" onclick="openAdd()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M12 5v14M5 12h14"/></svg>
  Add task
</button>
<div class="toast" id="toastEl"></div>

<!-- Add / Edit sheet -->
<div class="sheet-overlay" id="sheet-task">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="task-sheet-title">New task</div>
    <div class="field">
      <label class="field-label">Task</label>
      <textarea id="t-text" placeholder="What needs to get done?"></textarea>
    </div>
    <div class="field">
      <label class="field-label">Category</label>
      <div class="cat-grid" id="cat-grid"></div>
      <input type="text" id="t-cat-custom" placeholder="Or type a custom category…" style="margin-top:4px">
    </div>
    <div class="field">
      <label class="field-label">When</label>
      <div class="when-row">
        <button class="when-btn active" id="when-today" onclick="setWhen('today')">Today</button>
        <button class="when-btn" id="when-week" onclick="setWhen('week')">This week</button>
        <button class="when-btn" id="when-later" onclick="setWhen('later')">Later</button>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label class="field-label">Due / Time</label>
        <input type="text" id="t-meta" placeholder="e.g. 4:30 PM, Thu">
      </div>
      <div class="field">
        <label class="field-label">Notes</label>
        <input type="text" id="t-notes" placeholder="Optional">
      </div>
    </div>
    <div class="sheet-actions" id="task-actions"></div>
  </div>
</div>

<script>
const S = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v))
};
const uid = () => Math.random().toString(36).slice(2,10);
const KEY = 'rachel.tasks';

const DEFAULT_CATS = {
  Family:   ['#9A7B4C','#F0E8D7'],
  Nanny:    ['#2F6E63','#E1EFEC'],
  Kids:     ['#4E89A6','#E6F0F2'],
  Grocery:  ['#A86A3F','#F3E6DA'],
  Personal: ['#3F7E99','#E3EFF1']
};
const CAT_COLORS = [
  ['#9A7B4C','#F0E8D7'],['#2F6E63','#E1EFEC'],['#4E89A6','#E6F0F2'],
  ['#A86A3F','#F3E6DA'],['#3F7E99','#E3EFF1'],['#7E6B8F','#EDE6F5'],
  ['#4A8C6F','#E2F0EA'],['#C4784A','#F5E8DC']
];

function getTasks() {
  return S.get(KEY) || [
    {id:'t1',text:'Pick up Jackson from soccer',cat:'Family',when:'today',meta:'4:30 PM',notes:'',done:false},
    {id:'t2',text:'Send Laura the Thursday plan',cat:'Nanny',when:'today',meta:'',notes:'',done:false},
    {id:'t3',text:'Grocery for taco night',cat:'Grocery',when:'today',meta:'',notes:'',done:false},
    {id:'t4',text:'Text Matt about the weekend',cat:'Family',when:'today',meta:'',notes:'',done:false},
    {id:'t5',text:'Return Amazon package',cat:'Personal',when:'today',meta:'',notes:'',done:true},
    {id:'t6',text:"Order Pearson's kindergarten supplies",cat:'Kids',when:'week',meta:'Thu',notes:'',done:false},
    {id:'t7',text:"Schedule Parker's 3-year checkup",cat:'Kids',when:'week',meta:'',notes:'',done:false},
    {id:'t8',text:'Laura — pediatrician forms for Pearson',cat:'Nanny',when:'week',meta:'',notes:'',done:false},
    {id:'t9',text:"Refill Jackson's inhaler",cat:'Family',when:'week',meta:'',notes:'',done:false}
  ];
}
function saveTasks(t) { S.set(KEY, t); }

function getCatStyle(cat) {
  if (DEFAULT_CATS[cat]) return DEFAULT_CATS[cat];
  const tasks = getTasks();
  const existing = tasks.find(t => t.cat === cat && t.catColor);
  if (existing) return existing.catColor;
  return CAT_COLORS[Math.abs([...cat].reduce((a,c)=>a+c.charCodeAt(0),0)) % CAT_COLORS.length];
}

let filter = 'All';
let editingId = null;
let selectedWhen = 'today';
let selectedCat = 'Family';

// ── RENDER ─────────────────────────────────────────────────
function render() {
  const tasks = getTasks();
  const cats = ['All', ...new Set(tasks.map(t => t.cat))];

  document.getElementById('filters').innerHTML = cats.map(c =>
    `<button class="chip ${filter===c?'on':''}" onclick="filter='${c}';render()">${c}</button>`).join('');

  document.getElementById('left').textContent = tasks.filter(t=>!t.done).length + ' left';

  const show = tasks.filter(t => filter==='All' || t.cat===filter);
  const groups = [['today','Today'],['week','This week'],['later','Later']];
  let html = '';
  for (const [key,label] of groups) {
    const rows = show.filter(t => t.when===key);
    if (!rows.length) continue;
    html += `<div><div class="group-h">${label}</div>${rows.map(t => taskRow(t)).join('')}</div>`;
  }
  const done = show.filter(t => t.done);
  if (done.length && filter !== 'All') {
    html += `<div><div class="group-h">Done</div>${done.map(t => taskRow(t)).join('')}</div>`;
  }
  if (!html) html = `<div class="empty">Nothing here — enjoy the quiet.</div>`;
  document.getElementById('body').innerHTML = html;
}

function taskRow(t) {
  const [pc,pb] = getCatStyle(t.cat);
  return `<div class="task ${t.done?'done':''}" onclick="openEdit('${t.id}')">
    <span class="ck ${t.done?'done':''}" onclick="event.stopPropagation();toggle('${t.id}')"></span>
    <div style="flex:1;min-width:0">
      <div class="ttl">${t.text}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap">
        <span class="pill" style="color:${pc};background:${pb}">${t.cat}</span>
        ${t.meta?`<span class="meta">· ${t.meta}</span>`:''}
      </div>
      ${t.notes?`<div style="font-size:12px;color:#8AA0A3;margin-top:4px">${t.notes}</div>`:''}
    </div>
  </div>`;
}

function toggle(id) {
  const tasks = getTasks();
  const t = tasks.find(x => x.id===id);
  if (t) t.done = !t.done;
  saveTasks(tasks);
  render();
}

// ── SHEET ──────────────────────────────────────────────────
function openAdd() {
  editingId = null;
  selectedWhen = 'today';
  selectedCat = getTasks()[0]?.cat || 'Family';
  document.getElementById('task-sheet-title').textContent = 'New task';
  document.getElementById('t-text').value = '';
  document.getElementById('t-meta').value = '';
  document.getElementById('t-notes').value = '';
  document.getElementById('t-cat-custom').value = '';
  document.getElementById('task-actions').innerHTML = `
    <button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>
    <button class="btn btn-primary" onclick="saveTask()">Add</button>`;
  renderSheet();
  document.getElementById('sheet-task').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('t-text').focus(), 100);
}

function openEdit(id) {
  const t = getTasks().find(x => x.id===id);
  if (!t) return;
  editingId = id;
  selectedWhen = t.when || 'today';
  selectedCat = t.cat;
  document.getElementById('task-sheet-title').textContent = 'Edit task';
  document.getElementById('t-text').value = t.text;
  document.getElementById('t-meta').value = t.meta || '';
  document.getElementById('t-notes').value = t.notes || '';
  document.getElementById('t-cat-custom').value = DEFAULT_CATS[t.cat] ? '' : t.cat;
  document.getElementById('task-actions').innerHTML = `
    <button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>
    <button class="btn btn-danger" onclick="deleteTask('${id}')">Delete</button>
    <button class="btn btn-primary" onclick="saveTask()">Save</button>`;
  renderSheet();
  document.getElementById('sheet-task').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderSheet() {
  setWhen(selectedWhen);
  const tasks = getTasks();
  const allCats = [...new Set([...Object.keys(DEFAULT_CATS), ...tasks.map(t=>t.cat)])];
  document.getElementById('cat-grid').innerHTML = allCats.map(c => {
    const [pc,pb] = getCatStyle(c);
    return `<button class="cat-btn ${selectedCat===c?'active':''}"
      style="${selectedCat===c?`background:${pb};border-color:${pc};color:${pc}`:''}"
      onclick="selectedCat='${c}';document.getElementById('t-cat-custom').value='';renderCatGrid()">${c}</button>`;
  }).join('');
}

function renderCatGrid() {
  const tasks = getTasks();
  const allCats = [...new Set([...Object.keys(DEFAULT_CATS), ...tasks.map(t=>t.cat)])];
  document.getElementById('cat-grid').innerHTML = allCats.map(c => {
    const [pc,pb] = getCatStyle(c);
    return `<button class="cat-btn"
      style="${selectedCat===c?`background:${pb};border-color:${pc};color:${pc}`:''}"
      onclick="selectedCat='${c}';document.getElementById('t-cat-custom').value='';renderCatGrid()">${c}</button>`;
  }).join('');
}

function setWhen(w) {
  selectedWhen = w;
  ['today','week','later'].forEach(x => {
    document.getElementById('when-'+x).classList.toggle('active', x===w);
  });
}

function saveTask() {
  const text = document.getElementById('t-text').value.trim();
  if (!text) return;
  const custom = document.getElementById('t-cat-custom').value.trim();
  const cat = custom || selectedCat;
  const meta = document.getElementById('t-meta').value.trim();
  const notes = document.getElementById('t-notes').value.trim();
  const tasks = getTasks();
  if (editingId) {
    const t = tasks.find(x => x.id===editingId);
    if (t) { t.text=text; t.cat=cat; t.when=selectedWhen; t.meta=meta; t.notes=notes; }
  } else {
    tasks.unshift({id:uid(), text, cat, when:selectedWhen, meta, notes, done:false});
  }
  saveTasks(tasks);
  closeSheet();
  render();
}

function deleteTask(id) {
  saveTasks(getTasks().filter(t => t.id!==id));
  closeSheet();
  render();
}

function closeSheet() {
  document.getElementById('sheet-task').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('sheet-task').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSheet();
});

let tt;
function toast(m) { const e=document.getElementById('toastEl'); e.textContent=m; e.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>e.classList.remove('show'),1900); }

render();
</script>
</body>
</html>
