<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Travel — Rachel's Planner</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F2EA; --surface: #FFFFFF; --border: #E6E2D6;
  --ink: #2C3E45; --ink-muted: #6B7C84;
  --sea: #3F7E99; --sea-light: #EBF3F7; --sea-dark: #2E6178;
  --sand: #C9B99A;
  --font-serif: 'Lora', Georgia, serif;
  --font-sans: 'Mulish', system-ui, sans-serif;
  --radius: 12px; --radius-sm: 8px;
  --shadow: 0 1px 4px rgba(44,62,69,.08), 0 2px 12px rgba(44,62,69,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--ink);
  min-height: 100dvh; -webkit-tap-highlight-color: transparent; }

/* NAV */
.top-nav { position: sticky; top: 0; z-index: 100; background: var(--surface);
  border-bottom: 1px solid var(--border); display: flex; align-items: center;
  padding: 0 16px; height: 56px; gap: 12px; }
.nav-back { background: none; border: none; cursor: pointer; display: flex;
  align-items: center; gap: 6px; color: var(--sea); font-family: var(--font-sans);
  font-size: 15px; font-weight: 500; padding: 8px 0; }
.nav-title { font-family: var(--font-serif); font-size: 18px; color: var(--ink); flex: 1; text-align: center; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--ink-muted);
  padding: 6px; display: flex; align-items: center; justify-content: center; }
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn.danger { color: #E53E3E; }

/* TRIP LIST */
.trip-list { padding: 20px 16px 100px; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink-muted); margin-bottom: 10px; }
.trip-card { background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow);
  padding: 16px; margin-bottom: 12px; cursor: pointer; }
.trip-card-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: var(--sea); margin-bottom: 4px; }
.trip-card-name { font-family: var(--font-serif); font-size: 17px;
  font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.trip-card-meta, .trip-card-dest { font-size: 13px; color: var(--ink-muted); }
.trip-card-dest { margin-top: 2px; }
.empty-state { text-align: center; padding: 60px 20px;
  color: var(--ink-muted); font-size: 15px; line-height: 1.6; }
.empty-state-title { font-family: var(--font-serif); font-size: 20px;
  color: var(--ink); margin-bottom: 8px; }

/* ADD TRIP BTN */
.add-trip-btn { position: fixed; bottom: 84px; right: 20px; z-index: 50;
  width: 52px; height: 52px; border-radius: 50%; background: var(--sea);
  color: #fff; border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(63,126,153,.4);
  display: flex; align-items: center; justify-content: center; }
.add-trip-btn svg { width: 24px; height: 24px; }

/* DETAIL */
#detail-view { display: none; }
#detail-view.active { display: block; }
#list-view.hidden { display: none; }

/* HERO */
.hero { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 0; }
.hero-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--sea); margin-bottom: 6px; }
.hero-name { font-family: var(--font-serif); font-size: 22px; font-weight: 600;
  color: var(--ink); background: none; border: none; outline: none; width: 100%;
  border-bottom: 1.5px solid transparent; padding: 2px 0; margin-bottom: 10px;
  transition: border-color .15s; }
.hero-name:focus { border-bottom-color: var(--sea); }
.hero-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.chip { display: flex; align-items: center; gap: 5px; background: var(--sea-light);
  color: var(--sea); border-radius: 20px; padding: 5px 11px;
  font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent;
  white-space: nowrap; font-family: var(--font-sans); }
.chip svg { width: 13px; height: 13px; flex-shrink: 0; }
.weather-prose { font-size: 13px; color: var(--ink-muted); line-height: 1.5;
  padding: 0 0 14px; font-style: italic; }

/* Location autocomplete */
.loc-wrap { position: relative; }
.loc-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; min-width: 240px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
  box-shadow: var(--shadow); z-index: 200; overflow: hidden; display: none; }
.loc-dropdown.open { display: block; }
.loc-option { padding: 10px 14px; font-size: 14px; cursor: pointer;
  border-bottom: 1px solid var(--border); }
.loc-option:last-child { border-bottom: none; }
.loc-option:active { background: var(--sea-light); }

/* TAB BAR */
.tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn { flex: 1; min-width: 70px; padding: 12px 8px; background: none; border: none;
  cursor: pointer; font-family: var(--font-sans); font-size: 13px; font-weight: 600;
  color: var(--ink-muted); border-bottom: 2.5px solid transparent;
  transition: color .15s, border-color .15s; white-space: nowrap; }
.tab-btn.active { color: var(--sea); border-bottom-color: var(--sea); }

/* TAB PANELS */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* PACKING */
.sub-tab-bar { display: flex; gap: 8px; padding: 14px 16px 0; }
.sub-tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border); background: none;
  color: var(--ink-muted); font-family: var(--font-sans); transition: all .15s; }
.sub-tab.active { background: var(--sea); color: #fff; border-color: var(--sea); }
.filter-chips { display: flex; gap: 8px; padding: 10px 16px;
  overflow-x: auto; scrollbar-width: none; }
.filter-chips::-webkit-scrollbar { display: none; }
.filter-chip { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border); background: none;
  color: var(--ink-muted); font-family: var(--font-sans); white-space: nowrap; transition: all .15s; }
.filter-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.cat-block { margin: 0 16px 8px; }
.cat-header { display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0 6px; cursor: pointer; }
.cat-name { font-size: 12px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink-muted); }
.cat-count { font-size: 12px; color: var(--ink-muted); }
.cat-items { display: flex; flex-direction: column; gap: 2px; }
.cat-items.collapsed { display: none; }
.pack-item { background: var(--surface); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 10px 12px;
  display: flex; align-items: center; gap: 10px; }
.pack-item.packed { opacity: .55; }
.pack-item.na { opacity: .38; }
.pack-item-name { flex: 1; font-size: 14px; color: var(--ink); }
.pack-item-name.packed { text-decoration: line-through; }
.buy-tag { font-size: 11px; font-weight: 700; color: var(--sand); letter-spacing: .04em;
  text-transform: uppercase; background: #FAF5EE; border-radius: 4px; padding: 2px 6px; }
.pack-btns { display: flex; gap: 4px; }
.pack-btn { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700;
  cursor: pointer; border: 1.5px solid var(--border); background: none;
  color: var(--ink-muted); font-family: var(--font-sans); transition: all .12s; }
.pack-btn.sel-pack { background: var(--sea); color: #fff; border-color: var(--sea); }
.pack-btn.sel-packed { background: #4CAF74; color: #fff; border-color: #4CAF74; }
.pack-btn.sel-na { background: var(--ink-muted); color: #fff; border-color: var(--ink-muted); }

/* TO DO */
.todo-list { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
.todo-item { background: var(--surface); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 12px 14px;
  display: flex; align-items: center; gap: 12px; cursor: pointer; }
.todo-check { width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: all .15s; }
.todo-check.done { background: var(--sea); border-color: var(--sea); }
.todo-check svg { display: none; width: 11px; height: 11px; }
.todo-check.done svg { display: block; }
.todo-text { flex: 1; font-size: 14px; color: var(--ink); }
.todo-text.done { text-decoration: line-through; color: var(--ink-muted); }

/* ITINERARY */
.itin-day { margin: 14px 16px 0; }
.itin-day-label { font-family: var(--font-serif); font-size: 15px;
  font-weight: 600; color: var(--ink); margin-bottom: 8px; }
.itin-activity { background: var(--surface); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 10px 12px;
  display: flex; gap: 10px; margin-bottom: 6px; align-items: flex-start; }
.itin-time { font-size: 12px; color: var(--sea); font-weight: 600; min-width: 48px; }
.itin-body { flex: 1; }
.itin-title { font-size: 14px; color: var(--ink); }
.itin-notes { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
.itin-check { width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s; }
.itin-check.done { background: var(--sea); border-color: var(--sea); }
.itin-check svg { display: none; width: 11px; height: 11px; }
.itin-check.done svg { display: block; }
.itin-add-btn { display: flex; align-items: center; gap: 6px; font-size: 13px;
  color: var(--sea); font-weight: 600; cursor: pointer; background: none; border: none;
  font-family: var(--font-sans); padding: 8px 0; }
.itin-add-form { background: var(--surface); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 12px; margin-top: 4px; display: none; }
.itin-add-form.open { display: block; }

/* FLIGHTS */
.flights-wrap { padding: 16px 16px 100px; }
.api-key-notice { background: #FFF8ED; border: 1px solid #FDECC8;
  border-radius: var(--radius-sm); padding: 12px 14px;
  font-size: 13px; color: #856404; margin-bottom: 14px; }
.api-key-notice strong { display: block; margin-bottom: 6px; }
.api-key-row { display: flex; gap: 8px; margin-top: 6px; }
.flight-paste-area { width: 100%; min-height: 80px; resize: vertical;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 12px; font-size: 13px; font-family: var(--font-sans);
  color: var(--ink); background: var(--surface); outline: none; transition: border-color .15s; }
.flight-paste-area:focus { border-color: var(--sea); }
.flight-card { background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 10px; }
.flight-card-header { display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
.dir-badge { font-size: 10px; font-weight: 800; letter-spacing: .08em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
.dir-badge.outbound { background: var(--sea-light); color: var(--sea); }
.dir-badge.return { background: #F3F0F9; color: #6B4FA8; }
.flight-route { font-family: var(--font-serif); font-size: 16px;
  font-weight: 600; color: var(--ink); }
.flight-card-body { padding: 10px 14px 12px; }
.flight-airline-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.flight-airline-txt { font-size: 13px; color: var(--ink-muted); }
.open-app-btn { font-size: 12px; font-weight: 700; color: var(--sea);
  background: none; border: none; cursor: pointer; font-family: var(--font-sans); }
.flight-times { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.flight-time-block { text-align: center; }
.flight-time { font-size: 18px; font-weight: 700; color: var(--ink); }
.flight-airport-code { font-size: 12px; color: var(--ink-muted); font-weight: 600; }
.flight-conf { font-size: 12px; color: var(--ink-muted); }
.flight-conf span { font-weight: 700; color: var(--ink); }
.divider-lbl { font-size: 11px; font-weight: 700; color: var(--ink-muted);
  letter-spacing: .06em; text-transform: uppercase; text-align: center;
  display: flex; align-items: center; gap: 10px; margin: 20px 0 12px; }
.divider-lbl::before, .divider-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.seg-btns { display: flex; gap: 8px; margin-bottom: 14px; }
.seg-btn { flex: 1; padding: 9px; text-align: center; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); cursor: pointer; font-family: var(--font-sans);
  font-size: 13px; font-weight: 600; color: var(--ink-muted); background: none; transition: all .15s; }
.seg-btn.active { background: var(--sea); color: #fff; border-color: var(--sea); }

/* SHARED FORM */
.field-label { font-size: 11px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink-muted); margin-bottom: 4px; display: block; }
input[type=text], input[type=date], input[type=time], input[type=datetime-local],
select, textarea {
  width: 100%; padding: 10px 12px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); font-size: 14px; font-family: var(--font-sans);
  color: var(--ink); background: var(--surface); outline: none;
  transition: border-color .15s; -webkit-appearance: none; appearance: none; }
input:focus, select:focus, textarea:focus { border-color: var(--sea); }
.field { margin-bottom: 12px; }
.field-row { display: flex; gap: 10px; margin-bottom: 12px; }
.field-row > .field { flex: 1; margin-bottom: 0; }

/* BUTTONS */
.btn { padding: 10px 18px; border-radius: var(--radius-sm);
  font-family: var(--font-sans); font-size: 14px; font-weight: 700;
  cursor: pointer; border: none; transition: opacity .15s; display: inline-flex;
  align-items: center; gap: 6px; }
.btn:active { opacity: .8; }
.btn-primary { background: var(--sea); color: #fff; }
.btn-secondary { background: none; color: var(--sea); border: 1.5px solid var(--sea); }
.btn-ghost { background: none; color: var(--ink-muted); border: 1.5px solid var(--border); }
.btn-sm { padding: 7px 13px; font-size: 13px; }
.btn-full { width: 100%; justify-content: center; }

/* FAB */
.fab { position: fixed; bottom: 84px; right: 20px; z-index: 50;
  width: 52px; height: 52px; border-radius: 50%; background: var(--sea);
  color: #fff; border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(63,126,153,.4);
  display: flex; align-items: center; justify-content: center; }
.fab svg { width: 24px; height: 24px; }
.fab.hidden { display: none; }

/* SHEET */
.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3);
  z-index: 300; display: none; align-items: flex-end; }
.sheet-overlay.open { display: flex; }
.sheet { background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 90dvh; overflow-y: auto; padding: 20px 16px 40px; }
.sheet-handle { width: 40px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-family: var(--font-serif); font-size: 18px;
  font-weight: 600; color: var(--ink); margin-bottom: 16px; }
.sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
.sheet-actions > .btn { flex: 1; justify-content: center; }

/* SPINNER */
.spinner { width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.parse-spinner { border-color: rgba(63,126,153,.3); border-top-color: var(--sea); }

.spacer100 { height: 100px; }
</style>
</head>
<body>

<!-- ────────────── LIST VIEW ────────────── -->
<div id="list-view">
  <nav class="top-nav">
    <a href="/" class="nav-back" style="text-decoration:none;">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 4L6 10l6 6"/></svg>
      Home
    </a>
    <span class="nav-title">Travel</span>
    <div style="width:32px;"></div>
  </nav>
  <div class="trip-list" id="trip-list-container"></div>
  <button class="add-trip-btn" onclick="openNewTripSheet()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<!-- ────────────── DETAIL VIEW ────────────── -->
<div id="detail-view">
  <nav class="top-nav">
    <button class="nav-back" onclick="showList()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 4L6 10l6 6"/></svg>
      Trips
    </button>
    <div style="flex:1;"></div>
    <button class="icon-btn" onclick="openEditTripSheet()" title="Edit">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.5 3.5l2 2L7 15H5v-2L14.5 3.5z"/></svg>
    </button>
    <button class="icon-btn danger" onclick="deleteCurrentTrip()" title="Delete">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h12M8 6V4h4v2M8 10v5M12 10v5M5 6l1 10h8l1-10"/></svg>
    </button>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-eyebrow" id="hero-eyebrow">Trip</div>
    <input class="hero-name" id="hero-name" type="text" placeholder="Trip name" oninput="saveHeroName()">
    <div class="hero-chips">
      <div class="chip" onclick="openDateSheet()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M2 7h12M5 2v2M11 2v2"/></svg>
        <span id="date-chip-label">Add dates</span>
      </div>
      <div class="loc-wrap">
        <div class="chip" id="loc-chip" onclick="focusLoc()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="6" r="2"/><path d="M8 2C5.79 2 4 3.79 4 6c0 3.25 4 8 4 8s4-4.75 4-8c0-2.21-1.79-4-4-4z"/></svg>
          <span id="loc-chip-label">Add location</span>
        </div>
        <input id="loc-input" type="text" placeholder="City or destination"
          style="position:absolute;opacity:0;pointer-events:none;top:0;left:0;width:1px;height:1px;border:none;"
          oninput="onLocInput(event)" onblur="onLocBlur()">
        <div class="loc-dropdown" id="loc-dropdown"></div>
      </div>
    </div>
    <div class="weather-prose" id="weather-prose" style="display:none;"></div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('packing',this)">Packing</button>
    <button class="tab-btn" onclick="switchTab('todos',this)">To Do</button>
    <button class="tab-btn" onclick="switchTab('itinerary',this)">Itinerary</button>
    <button class="tab-btn" id="flights-tab-btn" style="display:none;" onclick="switchTab('flights',this)">Flights</button>
  </div>

  <!-- ═══ PACKING ═══ -->
  <div class="tab-panel active" id="tab-packing">
    <div class="sub-tab-bar">
      <button class="sub-tab active" onclick="switchSubTab('personal',this)">Personal</button>
      <button class="sub-tab" onclick="switchSubTab('kids',this)">Kids</button>
    </div>
    <div class="filter-chips">
      <button class="filter-chip active" onclick="switchPackFilter('remaining',this)">Still to pack</button>
      <button class="filter-chip" onclick="switchPackFilter('all',this)">All items</button>
    </div>
    <div id="pack-categories"></div>
    <button class="fab" id="pack-fab" onclick="openAddItemSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- ═══ TO DO ═══ -->
  <div class="tab-panel" id="tab-todos">
    <div class="filter-chips" style="padding-top:14px;">
      <button class="filter-chip active" onclick="switchTodoFilter('remaining',this)">Still to do</button>
      <button class="filter-chip" onclick="switchTodoFilter('all',this)">All</button>
    </div>
    <div class="todo-list" id="todo-list"></div>
    <button class="fab hidden" id="todo-fab" onclick="openAddTodoSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- ═══ ITINERARY ═══ -->
  <div class="tab-panel" id="tab-itinerary">
    <div id="itin-days"></div>
  </div>

  <!-- ═══ FLIGHTS ═══ -->
  <div class="tab-panel" id="tab-flights">
    <div class="flights-wrap">
      <div class="api-key-notice" id="api-key-notice" style="display:none;">
        <strong>Enable AI flight parsing</strong>
        Save your Anthropic API key to parse flight confirmation emails automatically.
        <div class="api-key-row">
          <input type="text" id="api-key-input" placeholder="sk-ant-..." style="flex:1;">
          <button class="btn btn-primary btn-sm" onclick="saveApiKey()">Save</button>
        </div>
      </div>

      <div id="flight-cards"></div>

<script>
// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let currentTripId = null;
let packList = 'personal';
let packFilter = 'remaining';
let todoFilter = 'remaining';
let activeTab = 'packing';
let editingTrip = false;
let flightDir = 'outbound';
let parsedBuffer = [];
let wxCache = {};
let locTimer = null;

const S = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};
const uid = () => Math.random().toString(36).slice(2,10);

// Keys
const kTrips = () => 'rachel.trips';
const kPack  = id => `rachel.pack.${id}`;
const kCust  = id => `rachel.custom.${id}`;
const kTodos = id => `rachel.todos.${id}`;
const kItin  = id => `rachel.itin.${id}`;
const kFlts  = id => `rachel.flights.${id}`;

const getTrips = () => S.get(kTrips()) || [];
const saveTrips = a => S.set(kTrips(), a);
const getTrip = id => getTrips().find(t => t.id === id);
const getPack = id => S.get(kPack(id)) || initPack(id);
const getCust = id => S.get(kCust(id)) || [];
const getTodos = id => S.get(kTodos(id)) || [];
const getItin = id => S.get(kItin(id)) || [];
const getFlts = id => S.get(kFlts(id)) || [];

// ══════════════════════════════════════════════════
// PACKING TEMPLATES
// ══════════════════════════════════════════════════
const PERSONAL = {
  'Clothing': ['Bathing suit','Cover-up','Casual tops','Shorts/pants','Underwear','Socks','Pajamas','Nice outfit','Sneakers','Sandals','Light jacket'],
  'Toiletries': ['Shampoo + conditioner','Body wash','Face wash','Moisturizer','Sunscreen','Deodorant','Toothbrush + toothpaste','Razor','Makeup','Hair tools','Perfume','Medications'],
  'Essentials': ['Phone charger','Headphones','Book/Kindle','Sunglasses','Hat','Water bottle','Cash/cards','ID/passport','Insurance card'],
  'Bags': ['Luggage','Beach bag','Day bag/backpack']
};
const KIDS = {
  'Clothing': ['Bathing suits (2+)','Rash guard','T-shirts','Shorts','Underwear','Pajamas','Sneakers','Sandals','Hat','Light jacket'],
  'Toiletries': ['Kids shampoo','Kids body wash','Kids sunscreen SPF 50+','Toothbrush + toothpaste','Medications','First aid kit'],
  'Beach/Outdoor': ['Floaties/puddle jumper','Sand toys','Beach towels','Goggles','Water shoes'],
  'Entertainment': ['iPad + charger','Headphones','Stuffed animal','Travel games','Coloring supplies'],
  'Snacks': ['Snack bars','Juice boxes','Fruit pouches','Water bottles']
};

function initPack(tripId) {
  const state = { personal: {}, kids: {} };
  for (const [cat, items] of Object.entries(PERSONAL)) {
    state.personal[cat] = items.map(name => ({id: uid(), name, buy: false, status: 'pack'}));
  }
  for (const [cat, items] of Object.entries(KIDS)) {
    state.kids[cat] = items.map(name => ({id: uid(), name, buy: false, status: 'pack'}));
  }
  S.set(kPack(tripId), state);
  return state;
}

// ══════════════════════════════════════════════════
// ROUTING
// ══════════════════════════════════════════════════
function showList() {
  currentTripId = null;
  document.getElementById('list-view').classList.remove('hidden');
  document.getElementById('detail-view').classList.remove('active');
  renderTripList();
}

function showDetail(id) {
  currentTripId = id;
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('detail-view').classList.add('active');
  activeTab = 'packing';
  packList = 'personal';
  packFilter = 'remaining';
  todoFilter = 'remaining';
  renderDetail();
}

// ══════════════════════════════════════════════════
// TRIP LIST
// ══════════════════════════════════════════════════
function renderTripList() {
  const trips = getTrips();
  const el = document.getElementById('trip-list-container');
  if (!trips.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-title">No trips yet</div>Tap + to start planning.</div>`;
    return;
  }
  const now = new Date();
  const upcoming = trips.filter(t => !t.endDate || new Date(t.endDate+'T23:59:59') >= now);
  const past = trips.filter(t => t.endDate && new Date(t.endDate+'T23:59:59') < now);
  let html = '';
  if (upcoming.length) {
    html += '<div class="section-label">Upcoming</div>' + upcoming.map(tripCard).join('');
  }
  if (past.length) {
    html += '<div class="section-label" style="margin-top:20px;">Past</div>' + past.map(tripCard).join('');
  }
  el.innerHTML = html;
}

function tripCard(t) {
  const dates = t.startDate ? fmtRange(t.startDate, t.endDate) : 'No dates set';
  return `<div class="trip-card" onclick="showDetail('${t.id}')">
    <div class="trip-card-eyebrow">${t.type||'Trip'}</div>
    <div class="trip-card-name">${t.name}</div>
    <div class="trip-card-meta">${dates}</div>
    ${t.destination?`<div class="trip-card-dest">${t.destination}</div>`:''}
  </div>`;
}

function fmtRange(start, end) {
  const s = new Date(start+'T12:00:00');
  if (!end || end===start) return s.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const e = new Date(end+'T12:00:00');
  const sy = s.getFullYear()===e.getFullYear();
  return s.toLocaleDateString('en-US',{month:'short',day:'numeric',year:sy?undefined:'numeric'})
    +' – '+e.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

// ══════════════════════════════════════════════════
// TRIP SHEET
// ══════════════════════════════════════════════════
function openNewTripSheet() {
  editingTrip = false;
  document.getElementById('sheet-trip-title').textContent = 'New Trip';
  document.getElementById('ts-save-btn').textContent = 'Create Trip';
  ['ts-name','ts-start','ts-end','ts-dest','ts-notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('ts-type').value = 'Beach';
  openSheet('sheet-trip');
}

function openEditTripSheet() {
  const trip = getTrip(currentTripId); if (!trip) return;
  editingTrip = true;
  document.getElementById('sheet-trip-title').textContent = 'Edit Trip';
  document.getElementById('ts-save-btn').textContent = 'Save';
  document.getElementById('ts-name').value = trip.name||'';
  document.getElementById('ts-type').value = trip.type||'Beach';
  document.getElementById('ts-start').value = trip.startDate||'';
  document.getElementById('ts-end').value = trip.endDate||'';
  document.getElementById('ts-dest').value = trip.destination||'';
  document.getElementById('ts-notes').value = trip.notes||'';
  openSheet('sheet-trip');
}

function saveTrip() {
  const name = document.getElementById('ts-name').value.trim();
  if (!name) { document.getElementById('ts-name').focus(); return; }
  const type = document.getElementById('ts-type').value;
  const startDate = document.getElementById('ts-start').value;
  const endDate = document.getElementById('ts-end').value;
  const destination = document.getElementById('ts-dest').value.trim();
  const notes = document.getElementById('ts-notes').value.trim();

  if (editingTrip) {
    const trips = getTrips();
    const i = trips.findIndex(t=>t.id===currentTripId);
    if (i!==-1) { trips[i]={...trips[i], name, type, startDate, endDate, destination, notes}; saveTrips(trips); }
    closeSheet('sheet-trip');
    renderDetail();
  } else {
    const trip = {id:uid(), name, type, startDate, endDate, destination, notes};
    const trips = getTrips(); trips.unshift(trip); saveTrips(trips);
    closeSheet('sheet-trip');
    showDetail(trip.id);
  }
  // Sync updated trips to push worker
  syncTripsToPush();
}

function deleteCurrentTrip() {
  const trip = getTrip(currentTripId);
  if (!confirm(`Delete "${trip?.name}"? This cannot be undone.`)) return;
  saveTrips(getTrips().filter(t=>t.id!==currentTripId));
  showList();
}

// ══════════════════════════════════════════════════
// DETAIL
// ══════════════════════════════════════════════════
function renderDetail() {
  const trip = getTrip(currentTripId); if (!trip) { showList(); return; }
  document.getElementById('hero-eyebrow').textContent = trip.type||'Trip';
  document.getElementById('hero-name').value = trip.name||'';

  // Date chip
  document.getElementById('date-chip-label').textContent =
    trip.startDate ? fmtRange(trip.startDate, trip.endDate) : 'Add dates';

  // Location chip
  const loc = trip.location || trip.destination || '';
  document.getElementById('loc-chip-label').textContent = loc || 'Add location';
  document.getElementById('loc-input').value = loc;

  // Flights tab
  const ft = document.getElementById('flights-tab-btn');
  if (trip.type==='Air Travel') ft.style.display='';
  else { ft.style.display='none'; if (activeTab==='flights') { activeTab='packing'; } }

  // Weather
  if (loc) loadWeather(loc);
  else document.getElementById('weather-prose').style.display='none';

  // Activate correct tab
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const activeBtn = document.querySelector(`.tab-btn[onclick*="'${activeTab}'"]`);
  if (activeBtn) activeBtn.classList.add('active');
  const activePanel = document.getElementById('tab-'+activeTab);
  if (activePanel) activePanel.classList.add('active');

  // FABs
  document.getElementById('pack-fab').classList.toggle('hidden', activeTab!=='packing');
  document.getElementById('todo-fab').classList.toggle('hidden', activeTab!=='todos');

  // Restore sub-tab state
  document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));
  const subBtn = document.querySelector(`.sub-tab[onclick*="'${packList}'"]`);
  if (subBtn) subBtn.classList.add('active');

  renderPackingTab();
  renderTodosTab();
  renderItinTab();
  renderFlightsTab();
}

function saveHeroName() {
  if (!currentTripId) return;
  const trips = getTrips();
  const i = trips.findIndex(t=>t.id===currentTripId);
  if (i!==-1) { trips[i].name = document.getElementById('hero-name').value; saveTrips(trips); }
}

// ══════════════════════════════════════════════════
// DATES
// ══════════════════════════════════════════════════
function openDateSheet() {
  const t = getTrip(currentTripId);
  document.getElementById('ds-start').value = t?.startDate||'';
  document.getElementById('ds-end').value = t?.endDate||'';
  openSheet('sheet-dates');
}

function saveDates() {
  const start = document.getElementById('ds-start').value;
  const end = document.getElementById('ds-end').value;
  const trips = getTrips();
  const i = trips.findIndex(t=>t.id===currentTripId);
  if (i!==-1) { trips[i].startDate=start; trips[i].endDate=end; saveTrips(trips); }
  closeSheet('sheet-dates');
  document.getElementById('date-chip-label').textContent = start ? fmtRange(start,end) : 'Add dates';
  renderItinTab();
}

// ══════════════════════════════════════════════════
// LOCATION + WEATHER
// ══════════════════════════════════════════════════
function focusLoc() {
  const inp = document.getElementById('loc-input');
  inp.style.cssText = 'position:fixed;top:0;left:0;width:200px;height:40px;opacity:0;pointer-events:auto;z-index:400;border:none;';
  inp.focus();
  document.getElementById('loc-chip').style.borderColor = 'var(--sea)';
}

function onLocInput(e) {
  const q = e.target.value;
  document.getElementById('loc-chip-label').textContent = q || 'Add location';
  clearTimeout(locTimer);
  if (q.length < 2) { closeLoc(); return; }
  locTimer = setTimeout(() => fetchLocs(q), 400);
}

function onLocBlur() {
  setTimeout(() => {
    closeLoc();
    document.getElementById('loc-chip').style.borderColor = '';
    const inp = document.getElementById('loc-input');
    inp.style.cssText = 'position:absolute;opacity:0;pointer-events:none;top:0;left:0;width:1px;height:1px;border:none;';
  }, 200);
}

async function fetchLocs(q) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`,
      {headers:{'Accept-Language':'en'}});
    const data = await r.json();
    const dd = document.getElementById('loc-dropdown');
    if (!data.length) { closeLoc(); return; }
    dd.innerHTML = data.map(d => {
      const label = d.display_name.split(',').slice(0,3).join(', ');
      return `<div class="loc-option" onmousedown="pickLoc('${label.replace(/'/g,"\\'")}')">${label}</div>`;
    }).join('');
    dd.classList.add('open');
  } catch { closeLoc(); }
}

function pickLoc(label) {
  document.getElementById('loc-chip-label').textContent = label;
  document.getElementById('loc-input').value = label;
  closeLoc();
  const trips = getTrips();
  const i = trips.findIndex(t=>t.id===currentTripId);
  if (i!==-1) { trips[i].location=label; saveTrips(trips); }
  loadWeather(label);
}

function closeLoc() { document.getElementById('loc-dropdown').classList.remove('open'); }

async function loadWeather(loc) {
  const el = document.getElementById('weather-prose');
  if (wxCache[loc]) { el.textContent=wxCache[loc]; el.style.display=''; return; }
  try {
    const r = await fetch(`https://wttr.in/${encodeURIComponent(loc)}?format=j1`);
    const d = await r.json();
    const days = (d.weather||[]).slice(0,7).map(w => ({
      highF: +w.maxtempF, lowF: +w.mintempF,
      desc: w.hourly?.[4]?.weatherDesc?.[0]?.value||''
    }));
    const summary = buildWxSummary(days, loc);
    wxCache[loc] = summary;
    el.textContent = summary; el.style.display='';
  } catch { el.style.display='none'; }
}

function buildWxSummary(days, loc) {
  if (!days.length) return '';
  const maxH = Math.max(...days.map(d=>d.highF));
  const minL = Math.min(...days.map(d=>d.lowF));
  const sunny = days.filter(d=>d.desc.match(/sunny|clear|partly/i)).length;
  let s = `Expect highs around ${Math.round(maxH)}°F and lows near ${Math.round(minL)}°F`;
  if (sunny >= days.length/2) s += ', with mostly sunny skies';
  s += ` during your trip to ${loc.split(',')[0]}.`;
  return s;
}

// ══════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  activeTab = name;
  document.getElementById('pack-fab').classList.toggle('hidden', name!=='packing');
  document.getElementById('todo-fab').classList.toggle('hidden', name!=='todos');
}

// ══════════════════════════════════════════════════
// PACKING
// ══════════════════════════════════════════════════
function switchSubTab(list, btn) {
  packList = list;
  document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPackingTab();
}

function switchPackFilter(f, btn) {
  packFilter = f;
  document.querySelectorAll('#tab-packing .filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPackingTab();
}

function renderPackingTab() {
  if (!currentTripId) return;
  const pack = getPack(currentTripId);
  const cust = getCust(currentTripId);
  const listData = pack[packList] || {};

  // Merge custom into categories
  const cats = {};
  for (const [cat, items] of Object.entries(listData)) cats[cat] = [...items];
  cust.filter(c=>c.list===packList).forEach(c=>{
    if (!cats[c.category]) cats[c.category]=[];
    cats[c.category].push(c);
  });

  let html = '';
  for (const [cat, items] of Object.entries(cats)) {
    const visible = packFilter==='remaining' ? items.filter(i=>i.status!=='packed'&&i.status!=='na') : items;
    if (!visible.length) continue;
    const remaining = items.filter(i=>i.status!=='packed'&&i.status!=='na').length;
    html += `<div class="cat-block">
      <div class="cat-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
        <span class="cat-name">${cat}</span>
        <span class="cat-count">${remaining}/${items.length}</span>
      </div>
      <div class="cat-items">${visible.map(packItemHtml).join('')}</div>
    </div>`;
  }
  document.getElementById('pack-categories').innerHTML = html ||
    '<div style="padding:24px 16px;color:var(--ink-muted);font-size:14px;text-align:center;">All packed!</div>';
}

function packItemHtml(item) {
  const isPacked = item.status==='packed';
  const isNA = item.status==='na';
  return `<div class="pack-item${isPacked?' packed':''}${isNA?' na':''}">
    <span class="pack-item-name${isPacked?' packed':''}">${item.name}</span>
    ${item.buy?'<span class="buy-tag">Buy</span>':''}
    <div class="pack-btns">
      <button class="pack-btn${item.status==='pack'?' sel-pack':''}" onclick="setPackStatus('${item.id}','pack')">Pack</button>
      <button class="pack-btn${isPacked?' sel-packed':''}" onclick="setPackStatus('${item.id}','packed')">Packed</button>
      <button class="pack-btn${isNA?' sel-na':''}" onclick="setPackStatus('${item.id}','na')">N/A</button>
    </div>
  </div>`;
}

function setPackStatus(itemId, status) {
  const pack = getPack(currentTripId);
  for (const listKey of ['personal','kids']) {
    for (const items of Object.values(pack[listKey]||{})) {
      const item = items.find(i=>i.id===itemId);
      if (item) { item.status=status; S.set(kPack(currentTripId),pack); renderPackingTab(); return; }
    }
  }
  const cust = getCust(currentTripId);
  const c = cust.find(i=>i.id===itemId);
  if (c) { c.status=status; S.set(kCust(currentTripId),cust); renderPackingTab(); }
}

function openAddItemSheet() {
  document.getElementById('ai-name').value='';
  document.getElementById('ai-cat').value='';
  document.getElementById('ai-buy').checked=false;
  openSheet('sheet-add-item');
}

function addCustomItem() {
  const name = document.getElementById('ai-name').value.trim(); if (!name) return;
  const category = document.getElementById('ai-cat').value.trim()||'Other';
  const buy = document.getElementById('ai-buy').checked;
  const cust = getCust(currentTripId);
  cust.push({id:uid(), name, category, buy, status:'pack', list:packList});
  S.set(kCust(currentTripId), cust);
  closeSheet('sheet-add-item');
  renderPackingTab();
}

// ══════════════════════════════════════════════════
// TODOS
// ══════════════════════════════════════════════════
function switchTodoFilter(f, btn) {
  todoFilter = f;
  document.querySelectorAll('#tab-todos .filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTodosTab();
}

function renderTodosTab() {
  if (!currentTripId) return;
  const todos = getTodos(currentTripId);
  const visible = todoFilter==='remaining' ? todos.filter(t=>!t.done) : todos;
  const el = document.getElementById('todo-list');
  if (!visible.length) {
    el.innerHTML = `<div style="color:var(--ink-muted);font-size:14px;text-align:center;padding:30px 0;">${todoFilter==='remaining'?'All done!':'No todos yet.'}</div>`;
    return;
  }
  el.innerHTML = visible.map(t=>`
    <div class="todo-item" onclick="toggleTodo('${t.id}')">
      <div class="todo-check${t.done?' done':''}">
        <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5"><path d="M2 6l3 3 5-5"/></svg>
      </div>
      <span class="todo-text${t.done?' done':''}">${t.text}</span>
      <button class="icon-btn" onclick="event.stopPropagation();deleteTodo('${t.id}')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h10M6 4V2.5h4V4M6 7v5M10 7v5M4 4l.8 8h6.4L12 4"/></svg>
      </button>
    </div>`).join('');
}

function toggleTodo(id) {
  const todos = getTodos(currentTripId);
  const t = todos.find(x=>x.id===id);
  if (t) { t.done=!t.done; S.set(kTodos(currentTripId),todos); renderTodosTab(); }
}

function deleteTodo(id) {
  S.set(kTodos(currentTripId), getTodos(currentTripId).filter(t=>t.id!==id));
  renderTodosTab();
}

function openAddTodoSheet() {
  document.getElementById('atd-text').value='';
  openSheet('sheet-add-todo');
}

function addTodo() {
  const text = document.getElementById('atd-text').value.trim(); if (!text) return;
  const todos = getTodos(currentTripId);
  todos.push({id:uid(), text, done:false});
  S.set(kTodos(currentTripId), todos);
  closeSheet('sheet-add-todo');
  renderTodosTab();
}

// ══════════════════════════════════════════════════
// ITINERARY
// ══════════════════════════════════════════════════
function tripDays(start, end) {
  if (!start) return [];
  const days = [];
  const s = new Date(start+'T12:00:00');
  const e = end ? new Date(end+'T12:00:00') : s;
  for (let d=new Date(s); d<=e; d.setDate(d.getDate()+1)) days.push(new Date(d));
  return days;
}

function renderItinTab() {
  if (!currentTripId) return;
  const trip = getTrip(currentTripId);
  const days = tripDays(trip?.startDate, trip?.endDate);
  const acts = getItin(currentTripId);
  const el = document.getElementById('itin-days');
  if (!days.length) {
    el.innerHTML='<div style="padding:30px 16px;color:var(--ink-muted);font-size:14px;text-align:center;">Add trip dates to plan each day.</div>';
    return;
  }
  el.innerHTML = days.map(day=>{
    const dk = day.toISOString().slice(0,10);
    const dayActs = acts.filter(a=>a.date===dk).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const label = day.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    return `<div class="itin-day">
      <div class="itin-day-label">${label}</div>
      ${dayActs.map(a=>itinActHtml(a)).join('')}
      <button class="itin-add-btn" onclick="toggleItinForm('${dk}')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="M8 3v10M3 8h10"/></svg>
        Add activity
      </button>
      <div class="itin-add-form" id="itin-form-${dk}">
        <div class="field-row" style="margin-bottom:8px;">
          <div class="field" style="flex:1;"><input type="time" id="itin-t-${dk}"></div>
          <div class="field" style="flex:2;"><input type="text" id="itin-title-${dk}" placeholder="Activity"></div>
        </div>
        <div class="field" style="margin-bottom:10px;"><input type="text" id="itin-notes-${dk}" placeholder="Notes (optional)"></div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="toggleItinForm('${dk}')">Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="addItinAct('${dk}')">Add</button>
        </div>
      </div>
    </div>`;
  }).join('') + '<div class="spacer100"></div>';
}

function itinActHtml(a) {
  return `<div class="itin-activity">
    <div class="itin-time">${a.time?fmt12(a.time):''}</div>
    <div class="itin-body">
      <div class="itin-title" style="${a.done?'text-decoration:line-through;color:var(--ink-muted);':''}">${a.title}</div>
      ${a.notes?`<div class="itin-notes">${a.notes}</div>`:''}
    </div>
    <button class="itin-check${a.done?' done':''}" onclick="toggleItinDone('${a.id}')">
      <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5"><path d="M2 6l3 3 5-5"/></svg>
    </button>
    <button class="icon-btn" onclick="deleteItinAct('${a.id}')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h10M6 4V2.5h4V4M6 7v5M10 7v5M4 4l.8 8h6.4L12 4"/></svg>
    </button>
  </div>`;
}

function fmt12(t) {
  const [h,m] = t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
}

function toggleItinForm(dk) {
  const f = document.getElementById(`itin-form-${dk}`);
  f.classList.toggle('open');
  if (f.classList.contains('open')) document.getElementById(`itin-title-${dk}`)?.focus();
}

function addItinAct(dk) {
  const title = document.getElementById(`itin-title-${dk}`)?.value.trim(); if (!title) return;
  const time = document.getElementById(`itin-t-${dk}`)?.value||'';
  const notes = document.getElementById(`itin-notes-${dk}`)?.value.trim()||'';
  const acts = getItin(currentTripId);
  acts.push({id:uid(), date:dk, time, title, notes, done:false});
  S.set(kItin(currentTripId), acts);
  renderItinTab();
}

function toggleItinDone(id) {
  const acts = getItin(currentTripId);
  const a = acts.find(x=>x.id===id);
  if (a) { a.done=!a.done; S.set(kItin(currentTripId),acts); renderItinTab(); }
}

function deleteItinAct(id) {
  S.set(kItin(currentTripId), getItin(currentTripId).filter(a=>a.id!==id));
  renderItinTab();
}

// ══════════════════════════════════════════════════
// FLIGHTS
// ══════════════════════════════════════════════════
const AIRLINE_LINKS = {
  american:  'https://www.aa.com/travelInformation/flights/status',
  delta:     'https://www.delta.com/us/en/flight-search/flight-status',
  united:    'https://www.united.com/ual/en/us/flight-search/flight-status',
  southwest: 'https://www.southwest.com/air/flight-status/',
  jetblue:   'https://www.jetblue.com/manage-trips/',
  alaska:    'https://www.alaskaair.com/flight-status',
  frontier:  'https://www.flyfrontier.com/travel-info/flight-status/',
  spirit:    'https://www.spirit.com/AvailablitySearch/Trips'
};

function renderFlightsTab() {
  if (!currentTripId) return;
  const apiKey = localStorage.getItem('rachel.anthropicKey');
  document.getElementById('api-key-notice').style.display = apiKey ? 'none' : '';
  const flights = getFlts(currentTripId);
  const outbound = flights.filter(f=>f.direction==='outbound');
  const ret = flights.filter(f=>f.direction==='return');
  let html = '';
  if (outbound.length) html += '<div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;">Outbound</div>' + outbound.map(flightCardHtml).join('');
  if (ret.length) html += '<div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted);margin:12px 0 8px;">Return</div>' + ret.map(flightCardHtml).join('');
  document.getElementById('flight-cards').innerHTML = html;
}

function flightCardHtml(f) {
  const ak = (f.airline||'').toLowerCase().replace(/\s+/g,'');
  const appKey = Object.keys(AIRLINE_LINKS).find(k=>ak.includes(k));
  return `<div class="flight-card">
    <div class="flight-card-header">
      <span class="dir-badge ${f.direction}">${f.direction==='outbound'?'Outbound':'Return'}</span>
      <span class="flight-route">${f.depAirport||'?'} → ${f.arrAirport||'?'}</span>
      <button class="icon-btn danger" onclick="deleteFlight('${f.id}')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 4h10M6 4V2.5h4V4M6 7v5M10 7v5M4 4l.8 8h6.4L12 4"/></svg>
      </button>
    </div>
    <div class="flight-card-body">
      <div class="flight-airline-row">
        <span class="flight-airline-txt">${f.airline||''}${f.flightNum?' · '+f.flightNum:''}</span>
        ${appKey?`<button class="open-app-btn" onclick="window.open('${AIRLINE_LINKS[appKey]}','_blank')">Open App</button>`:''}
      </div>
      <div class="flight-times">
        <div class="flight-time-block">
          <div class="flight-time">${fmtTime(f.depTime)}</div>
          <div class="flight-airport-code">${f.depAirport||''}</div>
        </div>
        <div style="color:var(--border);font-size:18px;">→</div>
        <div class="flight-time-block">
          <div class="flight-time">${fmtTime(f.arrTime)}</div>
          <div class="flight-airport-code">${f.arrAirport||''}</div>
        </div>
      </div>
      ${f.confCode?`<div class="flight-conf">Conf: <span>${f.confCode}</span></div>`:''}
      ${f.notes?`<div class="flight-conf" style="margin-top:2px;">${f.notes}</div>`:''}
    </div>
  </div>`;
}

function fmtTime(iso) {
  if (!iso) return '--';
  try { return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}); }
  catch { return iso; }
}

function deleteFlight(id) {
  S.set(kFlts(currentTripId), getFlts(currentTripId).filter(f=>f.id!==id));
  renderFlightsTab();
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key.startsWith('sk-')) { alert('That doesn\'t look like an Anthropic API key.'); return; }
  localStorage.setItem('rachel.anthropicKey', key);
  renderFlightsTab();
}

function setDir(dir, btn) {
  flightDir = dir;
  document.querySelectorAll('#dir-btns .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function addManualFlight() {
  const dep = document.getElementById('m-dep').value.trim().toUpperCase();
  const arr = document.getElementById('m-arr').value.trim().toUpperCase();
  if (!dep||!arr) { alert('Please enter departure and arrival airports.'); return; }
  const depT = document.getElementById('m-dep-t').value;
  const arrT = document.getElementById('m-arr-t').value;
  const flights = getFlts(currentTripId);
  flights.push({
    id: uid(), direction: flightDir,
    airline: document.getElementById('m-airline').value.trim(),
    flightNum: document.getElementById('m-num').value.trim(),
    depAirport: dep, arrAirport: arr,
    depTime: depT ? new Date(depT).toISOString() : '',
    arrTime: arrT ? new Date(arrT).toISOString() : '',
    confCode: document.getElementById('m-conf').value.trim().toUpperCase(),
    notes: document.getElementById('m-notes').value.trim()
  });
  S.set(kFlts(currentTripId), flights);
  ['m-airline','m-num','m-dep','m-arr','m-dep-t','m-arr-t','m-conf','m-notes'].forEach(id=>document.getElementById(id).value='');
  renderFlightsTab();
}

async function parseFlights() {
  const text = document.getElementById('flight-paste').value.trim(); if (!text) return;
  const apiKey = localStorage.getItem('rachel.anthropicKey');
  if (!apiKey) {
    document.getElementById('api-key-notice').style.display='';
    document.getElementById('api-key-input').focus(); return;
  }
  document.getElementById('parse-btn').style.display='none';
  document.getElementById('parse-spinner').style.display='flex';
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{role:'user', content:
`Extract all flights from this text. Return ONLY a JSON array. Each item: direction ("outbound" or "return", first=outbound), airline, flightNum, depAirport (IATA), arrAirport (IATA), depTime (ISO local datetime), arrTime (ISO local datetime), confCode, notes.

${text}`}]
      })
    });
    const d = await r.json();
    const txt = d.content?.[0]?.text||'';
    const m = txt.match(/\[[\s\S]*\]/);
    if (!m) throw new Error('No JSON array found');
    parsedBuffer = JSON.parse(m[0]);
    showParsedPreview(parsedBuffer);
  } catch(e) {
    alert('Could not parse flights. Try adding manually.\n\n'+e.message);
  } finally {
    document.getElementById('parse-btn').style.display='';
    document.getElementById('parse-spinner').style.display='none';
  }
}

function showParsedPreview(flights) {
  document.getElementById('flight-preview-list').innerHTML = flights.map(f=>`
    <div style="margin-bottom:10px;padding:12px;background:var(--sea-light);border-radius:var(--radius-sm);">
      <div style="font-size:11px;font-weight:700;color:var(--sea);text-transform:uppercase;margin-bottom:4px;">${f.direction}</div>
      <div style="font-weight:600;font-size:15px;">${f.depAirport||'?'} → ${f.arrAirport||'?'}</div>
      <div style="font-size:13px;color:var(--ink-muted);">${f.airline||''} ${f.flightNum||''} · ${f.confCode||''}</div>
      <div style="font-size:13px;color:var(--ink-muted);">${f.depTime?new Date(f.depTime).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}):''}</div>
    </div>`).join('');
  openSheet('sheet-flight-preview');
}

function confirmParsed() {
  const flights = getFlts(currentTripId);
  parsedBuffer.forEach(f => flights.push({
    id:uid(), direction:f.direction||'outbound',
    airline:f.airline, flightNum:f.flightNum,
    depAirport:f.depAirport, arrAirport:f.arrAirport,
    depTime:f.depTime, arrTime:f.arrTime,
    confCode:f.confCode, notes:f.notes
  }));
  S.set(kFlts(currentTripId), flights);
  document.getElementById('flight-paste').value='';
  closeSheet('sheet-flight-preview');
  renderFlightsTab();
}

// SHEET HELPERS
// ══════════════════════════════════════════════════
function openSheet(id) { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }

document.querySelectorAll('.sheet-overlay').forEach(el=>{
  el.addEventListener('click', e=>{ if(e.target===el) closeSheet(el.id); });
});

// Enter key on sheets
document.getElementById('ts-name').addEventListener('keydown', e=>{ if(e.key==='Enter') saveTrip(); });
document.getElementById('ai-name').addEventListener('keydown', e=>{ if(e.key==='Enter') addCustomItem(); });
document.getElementById('atd-text').addEventListener('keydown', e=>{ if(e.key==='Enter') addTodo(); });
document.getElementById('api-key-input').addEventListener('keydown', e=>{ if(e.key==='Enter') saveApiKey(); });

// ══════════════════════════════════════════════════
// PUSH SYNC
// ══════════════════════════════════════════════════
async function syncTripsToPush() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (!sub) return;
    const trips = getTrips();
    fetch('https://rachel-planner-worker.jennysobera.workers.dev/sync-trips', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subscriptionEndpoint: sub.endpoint, trips })
    });
  } catch (e) {}
}
